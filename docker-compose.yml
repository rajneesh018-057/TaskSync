services:
  # ----------------------------------------------------
  # Database Service (PostgreSQL)
  # ----------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: tasksync-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: tasksync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ----------------------------------------------------
  # Backend API Server (Express + Prisma)
  # ----------------------------------------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tasksync-backend
    restart: always
    ports:
      - "5050:5050"
    environment:
      PORT: 5050
      JWT_SECRET: ${JWT_SECRET:-RajnishSecretJWTTokenKey2026}
      # Point database connection to the database container
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/tasksync?schema=public
      DIRECT_URL: postgresql://postgres:postgrespassword@db:5432/tasksync?schema=public
      GROQ_API_KEY: ${GROQ_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:5050/api/auth/google/callback}
    depends_on:
      - db

  # ----------------------------------------------------
  # Frontend Web Client (React + Nginx)
  # ----------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tasksync-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  postgres_data:
